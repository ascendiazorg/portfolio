<svg
  xmlns="http://www.w3.org/2000/svg"
  width="1200"
  height="630"
  viewBox="0 0 1200 630"
>
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#FAF5EE"/>
      <stop offset="100%" stop-color="#F0E8DC"/>
    </linearGradient>

    <!-- Crimson accent gradient -->
    <linearGradient id="crimson-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#8B1A1A"/>
      <stop offset="50%"  stop-color="#B22222"/>
      <stop offset="100%" stop-color="#8B1A1A"/>
    </linearGradient>

    <!-- Decorative circle gradient -->
    <radialGradient id="circle-grad" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#8B1A1A" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#8B1A1A" stop-opacity="0"/>
    </radialGradient>

    <!-- Clip for rounded rectangle -->
    <clipPath id="round-clip">
      <rect width="1200" height="630" rx="0" ry="0"/>
    </clipPath>
  </defs>

  <!-- ── Background ── -->
  <rect width="1200" height="630" fill="url(#bg-grad)"/>

  <!-- ── Subtle dot grid ── -->
  <pattern id="dots" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
    <circle cx="1" cy="1" r="1" fill="#C4B8AB" opacity="0.45"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#dots)"/>

  <!-- ── Decorative large circle (top-right) ── -->
  <circle cx="1050" cy="80" r="320" fill="url(#circle-grad)"/>

  <!-- ── Decorative large circle (bottom-left) ── -->
  <circle cx="140" cy="560" r="240" fill="url(#circle-grad)"/>

  <!-- ── Left accent rule ── -->
  <rect x="72" y="180" width="3" height="270" rx="2" fill="#8B1A1A" opacity="0.8"/>

  <!-- ── Top crimson bar ── -->
  <rect x="72" y="180" width="80" height="3" rx="2" fill="url(#crimson-grad)"/>

  <!-- ── Label: PORTFOLIO ── -->
  <text
    x="88"
    y="174"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="11"
    font-weight="400"
    fill="#8B1A1A"
    letter-spacing="6"
    text-anchor="start"
    opacity="0.9"
  >PORTFOLIO</text>

  <!-- ── Name: Ascendiazorg ── -->
  <text
    x="88"
    y="305"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="72"
    font-weight="700"
    fill="#1a1a1a"
    letter-spacing="-1"
    text-anchor="start"
  >Ascendiazorg</text>

  <!-- ── Surname: Riupassa ── -->
  <text
    x="88"
    y="388"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="72"
    font-weight="400"
    font-style="italic"
    fill="#8B1A1A"
    letter-spacing="-1"
    text-anchor="start"
  >Riupassa</text>

  <!-- ── Tagline ── -->
  <text
    x="88"
    y="445"
    font-family="Georgia, sans-serif"
    font-size="20"
    font-weight="400"
    fill="#6B6560"
    letter-spacing="0.5"
    text-anchor="start"
  >Creative Design · Visual Storytelling · Editorial Craft</text>

  <!-- ── Bottom crimson bar ── -->
  <rect x="72" y="450" width="80" height="3" rx="2" fill="url(#crimson-grad)"/>

  <!-- ── Right decorative ornament (large serif numeral) ── -->
  <text
    x="1100"
    y="560"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="480"
    font-weight="700"
    fill="none"
    stroke="#C4B8AB"
    stroke-width="1"
    opacity="0.30"
    text-anchor="middle"
  >A</text>

  <!-- ── Corner dots ornament ── -->
  <circle cx="1156" cy="600" r="5" fill="#8B1A1A" opacity="0.30"/>
  <circle cx="1140" cy="600" r="3" fill="#8B1A1A" opacity="0.20"/>
  <circle cx="1128" cy="600" r="2" fill="#8B1A1A" opacity="0.15"/>

  <circle cx="44"   cy="30"  r="5" fill="#8B1A1A" opacity="0.30"/>
  <circle cx="60"   cy="30"  r="3" fill="#8B1A1A" opacity="0.20"/>
  <circle cx="72"   cy="30"  r="2" fill="#8B1A1A" opacity="0.15"/>

  <!-- ── Bottom footer strip ── -->
  <rect x="0" y="610" width="1200" height="20" fill="#8B1A1A" opacity="0.06"/>

  <!-- ── URL / domain placeholder ── -->
  <text
    x="1156"
    y="597"
    font-family="Georgia, sans-serif"
    font-size="13"
    font-weight="400"
    fill="#6B6560"
    letter-spacing="1"
    text-anchor="end"
    opacity="0.7"
  >ascendiazorg.com</text>
</svg>
